{% extends 'app/base.html' %}

{% block main %}
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"> 
<div>
    <h3 class="txt-centre" style="padding: 10px;background-color: greenyellow;"> Emplyee Details</h3>
</div>

<div class="container">
    <button class="btn btn-primary" style="width: 160px;background-color: black;margin-left: 314px;">
    <a href="{{baseUrl}}/addemployee" style="text-decoration: none;"><i class="fa-solid fa-plus"></i><span style="margin-left: 3px;color: floralwhite;">Add New Employee</span></a>
    </button>
</div>

<div class="container" style="margin-top: 5px;">
    <table border="2">
        <thead style="background: black;color: floralwhite;">
            <th style="padding: 10px;">Sr.No.</th>
            <th style="padding: 10px;">Employee Name</th>
            <th style="padding: 10px;">Employee Designation</th>
            <th style="padding: 10px;">Edit</th>
            <th style="padding: 10px;">Delete</th>
        </thead>
    
        <tbody>
            {% for i in employee_object %}
            <tr>
                <td class="" style="text-align: center;">{{forloop.counter}}</td>
                <td>{{i.emp_first_name}} {{i.emp_last_name}}</td>
                <td>{{i.emp_designation}}</td>
                <td><a href="{{baseUrl}}/editemployee/{{i.emp_id}}"><i class="fas fa-edit" style="margin: 10px 15px;"></i></a></td>
                <td><a href="{{baseUrl}}/deleteemployee/{{i.emp_id}}"><i class="fas fa-trash" style="margin: 10px 15px;cursor: pointer;"></i></a></td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
