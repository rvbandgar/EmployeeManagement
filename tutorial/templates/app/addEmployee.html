{% extends 'app/base.html' %}

{% block main %}

<div class="container">
    <form>
        {% csrf_token %}
        <div class="form-group row">
            <label for="FirstName" class="col-sm-2 mt-2 col-form-label">First Name</label>
            <div class="col-sm-8">
                <input type="text" class="form-control" id="firstName" placeholder="First Name">
            </div>
        </div>
    
        <div class="form-group row">
            <label for="lastName" class="col-sm-2 mt-2 col-form-label">Last Name</label>
            <div class="col-sm-8">
                <input type="text" class="form-control" id="lastName" placeholder="Last Name">
            </div>
        </div>
    
        <div class="form-group row">
            <label for="employeeDesignation" class="col-sm-2 mt-2 col-form-label">Employee Designation</label>
            <div class="col-sm-8">
                <input type="text" class="form-control" id="employeeDesignation" placeholder="Employee Designation">
            </div>
        </div>

        <div class="form-group row">
            <label for="employeeSkills" class="col-sm-2 mt-2 col-form-label" >Skills</label>
            <div class="employeeSkills col-sm-8">
                {% if skills %}
                {% for skill in skills %}
                    <input type="checkbox" name="{{skill}}" value="{{skill}}">
                    <label for="{{skill}}" >{{skill}}</label><br>
                    <!-- {{skill}} -->
                {% endfor %}
                {% endif %}
                <!-- <input type="checkbox"   name="Python" value="Python" checked>
                <label for="Python" class="col-sm-2" >Python</label><br>
                <input type="checkbox"  name="Django" value="Django">
                <label for="Django" >Django</label><br>
                <input type="checkbox"  name="HTML" value="HTML">
                <label for="HTML" >HTML</label><br> -->
            </div>
        </div>
    
        <button type="button" class="btn btn-primary" id="employeeSubmitForm" style="margin-left: 35%;
    margin-top: 2%;">Submit</button>
    
    
        <!-- <div class="form-group row">
            <label for="staticEmail" class="col-sm-2 col-form-label">Email</label>
            <div class="col-sm-10">
                <input type="text" readonly class="form-control-plaintext" id="staticEmail" value="email@example.com">
            </div>
        </div>
        <div class="form-group row">
            <label for="inputPassword" class="col-sm-2 col-form-label">Password</label>
            <div class="col-sm-10">
                <input type="password" class="form-control" id="inputPassword" placeholder="Password">
            </div>
        </div> -->
    
    
    </form>
</div>
{% endblock %}


{% block js %}
<script>
    

    document.querySelector('#employeeSubmitForm').addEventListener('click', employeeForm)

    function employeeForm(event){
        event.preventDefault();
        firstName = document.getElementById('firstName').value;
        lastName = document.getElementById('lastName').value;
        employeeDesignation = document.getElementById('employeeDesignation').value;
        const csrfToken = document.querySelector('[name=csrfmiddlewaretoken]').value;
        let selectedSkills = [];
        document.querySelectorAll('.employeeSkills input[type=checkbox]:checked').forEach(skill => {
        selectedSkills.push(skill.value);
        });

        console.table([firstName,lastName,employeeDesignation,selectedSkills])

        const data = {
            "emp_first_name":firstName,
            "emp_last_name":lastName,
            "emp_designation":employeeDesignation,
            "skills":selectedSkills,
            "csrfmiddlewaretoken": csrfToken

        }

        $.ajax({
            type:'POST',
            url:'{{baseUrl}}/addemployee',
            data:data,
            success: function(response){
                alert('Employee added successfully');
                window.location.href = '{{baseUrl}}/showdata';
            },
            error: function(xhr, status, error){
                alert('An error occurred: ' + xhr.responseText);
                console.error('Error details:', status, error);
            }

        })
    }
</script>

<link rel="stylesheet" href="node_modules/virtual-select-plugin/dist/virtual-select.min.css">
<script src="node_modules/virtual-select-plugin/dist/virtual-select.min.js"></script>

<!-- optional -->
<link rel="stylesheet" href="node_modules/tooltip-plugin/dist/tooltip.min.css">
<script src="node_modules/tooltip-plugin/dist/tooltip.min.js"></script>

{% endblock %}
